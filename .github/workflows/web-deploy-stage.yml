name: Build and Deploy to GitHub Pages (stage)

on:
  push:
    branches: [stage]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-stage
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 5.0.6

      - name: Configure
        run: emcmake cmake -DCMAKE_BUILD_TYPE=Release -B embuild

      - name: Build
        run: cmake --build embuild -j4

      - name: Rename to index.html
        run: mv embuild/astral.html embuild/index.html

      - name: Deploy to GitHub Pages (stage)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: embuild
          target-folder: stage
          clean: false
